name: Daily Update & Deploy

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 새벽 1시 UTC (한국 오전 10시)
  workflow_dispatch:     # 수동 실행 버튼도 허용

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Git checkout
        uses: actions/checkout@v3

      - name: 🔧 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔑 Set API Key
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: echo "CLAUDE_API_KEY=${CLAUDE_API_KEY}" >> $GITHUB_ENV

      - name: 📰 Collect articles
        run: python scripts/collect_articles.py

      - name: 🧭 Update navigation
        run: python scripts/update_nav.py

      - name: ⬆️ Commit new articles to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/articles mkdocs.yml
          git commit -m "📰 자동 기사 수집 및 메뉴 갱신" || echo "No changes to commit"
          git push origin main

      - name: 🚀 Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdocs gh-deploy --force --remote-branch gh-pages --remote-name origin
