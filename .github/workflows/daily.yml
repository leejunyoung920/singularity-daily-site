name: Daily Article Sync

on:
  schedule:
    - cron: '0 1 * * *'  # 오전 10시 KST (UTC+9 = 1시 UTC)
  workflow_dispatch:      # 수동 실행도 가능하게

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run article collector
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          python scripts/collect_articles.py
          python scripts/update_nav.py

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/articles mkdocs.yml
          git diff --cached --quiet || git commit -m "🤖 Daily article update"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
